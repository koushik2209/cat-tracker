name: Build Android APK

# Runs automatically on every push to main, and can also be triggered manually
# from the Actions tab on GitHub ("Run workflow" button).
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java (required for Android Gradle build)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Build web app (Vite)
        run: npm run build

      - name: Sync Capacitor (copies dist/ into the Android project)
        run: node_modules/.bin/cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK as downloadable artifact
        uses: actions/upload-artifact@v4
        with:
          name: cat-tracker-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90
